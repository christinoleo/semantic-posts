name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpcs:
    name: PHPCS (WPCS + AR-10/AR-12 sniffs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS
        run: composer lint

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Composer install
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPUnit
        run: composer test

  no-jquery:
    name: AR-14 — no jQuery in assets/js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid jQuery references in assets/js/
        run: |
          if [ ! -d assets/js ]; then
            echo "No assets/js directory yet — skipping (no JS to check)."
            exit 0
          fi
          # Match either the `jQuery` identifier or the jQuery shorthand `$(`.
          # Allow legitimate uses like console.log or "$" inside strings? No — AR-14 is strict.
          if grep -RnE '\bjQuery\b|\$\(' assets/js/ ; then
            echo "::error::AR-14 violation — jQuery or jQuery-shorthand \`\$(\` found in assets/js/."
            exit 1
          fi
          echo "OK — no jQuery references found."

  single-hook-owner:
    name: Bootstrap is the only place add_action/add_filter is called
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for stray add_action/add_filter outside Bootstrap
        run: |
          set -e
          # Find PHP files in src/ that call add_action/add_filter; allowlist Bootstrap.php only.
          violations=$(grep -REn '\b(add_action|add_filter)\s*\(' src/ \
            | grep -v '^src/Bootstrap\.php:' \
            || true)
          if [ -n "$violations" ]; then
            echo "::error::Hook registration must live in Bootstrap. Offenders:"
            echo "$violations"
            exit 1
          fi
          # Same check for the main plugin file: add_action/add_filter must NOT appear.
          if grep -En '\b(add_action|add_filter)\s*\(' semantic-posts.php ; then
            echo "::error::semantic-posts.php must not call add_action/add_filter — delegate to Bootstrap."
            exit 1
          fi
          echo "OK — Bootstrap is the only hook owner."
