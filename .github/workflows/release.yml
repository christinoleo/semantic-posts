name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build deployment zip
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          coverage: none
          tools: composer:v2

      - name: Build zip
        run: bash bin/build-zip.sh

      - name: Locate artifact
        id: artifact
        run: |
          ZIP=$(ls semantic-posts-*.zip | head -1)
          SHA=$(sha256sum "$ZIP" | awk '{print $1}')
          SIZE=$(stat -c '%s' "$ZIP")
          {
            echo "zip=$ZIP"
            echo "sha=$SHA"
            echo "size=$SIZE"
          } >> "$GITHUB_OUTPUT"
          echo "==> $ZIP"
          echo "    sha256: $SHA"
          echo "    bytes:  $SIZE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.zip }}
          path: ${{ steps.artifact.outputs.zip }}
          retention-days: 90

      - name: Verify idempotency (two-build byte-equality)
        run: |
          ORIG_SHA="${{ steps.artifact.outputs.sha }}"
          mv "${{ steps.artifact.outputs.zip }}" /tmp/original.zip
          bash bin/build-zip.sh
          NEW_SHA=$(sha256sum semantic-posts-*.zip | awk '{print $1}')
          if [ "$ORIG_SHA" != "$NEW_SHA" ]; then
            echo "::error::build is not byte-identical (orig=$ORIG_SHA new=$NEW_SHA)"
            exit 1
          fi
          mv /tmp/original.zip "${{ steps.artifact.outputs.zip }}"

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.zip }}
          body: |
            SemanticPosts release.

            sha256: `${{ steps.artifact.outputs.sha }}`
            size: ${{ steps.artifact.outputs.size }} bytes

            Built from ${{ github.sha }}.
